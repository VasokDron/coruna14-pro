<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Coruna Stage 1</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 15px; font-size: 12px; }
        #log { border: 1px solid #333; padding: 10px; background: #050505; min-height: 400px; white-space: pre-wrap; }
        .success { color: #0f0; } .error { color: #f55; } .warn { color: #fb0; }
    </style>
</head>
<body>
    <div id="log">Ініціалізація...</div>

    <script src="utility_module.js"></script>
    <script src="platform_module.js"></script>

    <script>
        const logDiv = document.getElementById('log');
        window.log = (msg, cls = '') => {
            logDiv.innerHTML += `<div class="${cls}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            window.scrollTo(0, document.body.scrollHeight);
        };

        class ModuleManager {
            constructor() { this.modules = new Map(); }
            registerModule(id, factory) {
                try {
                    this.modules.set(id, factory(this));
                    log("Зареєстровано: " + id.substring(0, 8), "success");
                } catch(e) { log("Помилка реєстрації " + id.substring(0,8) + ": " + e, "error"); }
            }
            getModuleByName(id) { return this.modules.get(id); }
        }

        async function start() {
            log("Запуск менеджера...");
            const mm = new ModuleManager();
            globalThis.moduleManager = mm;

            // Підключення твоїх функцій
            if (typeof m_57620206d62079baad0e57e6d9ec93120c0f5247 !== 'undefined')
                mm.registerModule("57620206d62079baad0e57e6d9ec93120c0f5247", m_57620206d62079baad0e57e6d9ec93120c0f5247);
            
            if (typeof m_14669ca3b1519ba2a8f40be287f646d4d7593eb0 !== 'undefined')
                mm.registerModule("14669ca3b1519ba2a8f40be287f646d4d7593eb0", m_14669ca3b1519ba2a8f40be287f646d4d7593eb0);

            try {
                const platform = mm.getModuleByName("14669ca3b1519ba2a8f40be287f646d4d7593eb0");
                if (platform) {
                    log("Виявлення версії iOS...", "warn");
                    if (platform.An) platform.An(); // Налаштування прапорців версії
                    
                    log("Спроба знайти JSC base (Stage 1)...", "warn");
                    await platform.run(); 
                }
            } catch (e) {
                log("ПОМИЛКА: " + e.message, "error");
                if (e.message.includes("ba712e")) {
                    log("УВАГА: Потрібен модуль Mach-O (ba712e...). Пошукай його в репозиторії.", "error");
                }
            }
        }

        window.onload = () => setTimeout(start, 500);
    </script>
</body>
</html>
