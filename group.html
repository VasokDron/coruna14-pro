<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Coruna Exploit Stage</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        #console { border: 1px solid #333; padding: 10px; min-height: 400px; white-space: pre-wrap; background: #050505; }
        .green { color: #00ff00; }
        .blue { color: #00bbff; }
        .red { color: #ff5555; }
    </style>
</head>
<body>
    <div id="console"></div>

    <script src="utility_module.js"></script>
    <script src="platform_module.js"></script>

    <script>
        const consoleDiv = document.getElementById('console');
        window.log = function(msg) {
            const line = document.createElement('div');
            line.innerText = msg;
            consoleDiv.appendChild(line);
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        };

        // Тот самий менеджер, що і на 34306.lol
        class ModuleManager {
            constructor() {
                this.modules = new Map();
                log("[SYSTEM] ModuleManager initialized.");
            }
            registerModule(id, factory) {
                try {
                    // Викликаємо функцію-фабрику і передаємо їй цей менеджер
                    const module = factory(this);
                    this.modules.set(id, module);
                    log("[SYSTEM] Registered: " + id.substring(0, 10) + "...");
                } catch(e) {
                    log("[ERROR] Failed to register " + id + ": " + e);
                }
            }
            getModuleByName(id) {
                return this.modules.get(id);
            }
        }

        async function run() {
            log("[START] Initializing exploit chain...");
            
            const mm = new ModuleManager();
            globalThis.moduleManager = mm;

            // Реєструємо модулі
            if (typeof m_57620206d62079baad0e57e6d9ec93120c0f5247 !== 'undefined') {
                mm.registerModule("57620206d62079baad0e57e6d9ec93120c0f5247", m_57620206d62079baad0e57e6d9ec93120c0f5247);
            }

            if (typeof m_14669ca3b1519ba2a8f40be287f646d4d7593eb0 !== 'undefined') {
                mm.registerModule("14669ca3b1519ba2a8f40be287f646d4d7593eb0", m_14669ca3b1519ba2a8f40be287f646d4d7593eb0);
            }

            // Запускаємо логіку платформи
            const platform = mm.getModuleByName("14669ca3b1519ba2a8f40be287f646d4d7593eb0");
            if (platform) {
                log("[INFO] Running platform detection...");
                // В оригіналі ініціалізація часто йде через внутрішні виклики
                // Але ми спробуємо активувати базові функції
                try {
                    // Якщо в модулі є функція ініціалізації/запуску:
                    if(platform.run) await platform.run();
                } catch(e) {
                    log("[DEBUG] Platform output: " + e);
                }
            } else {
                log("[ERROR] Platform module not found. Check if scripts are loaded correctly.");
            }
        }

        // Чекаємо завантаження всіх файлів
        window.onload = () => setTimeout(run, 1000);
    </script>
</body>
</html>
