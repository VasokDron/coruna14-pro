<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coruna Project</title>
    <style>
        body {
            background-color: #000;
            color: #ccc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #log-container {
            width: 100%;
            max-width: 600px;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .log-entry {
            font-family: "SF Mono", "Monaco", "Inconsolata", monospace;
            font-size: 12px;
            margin-bottom: 5px;
            border-bottom: 1px solid #222;
            padding-bottom: 2px;
        }
        .info { color: #00aeef; }
        .success { color: #00ff00; }
        .error { color: #ff3b30; }
        .warn { color: #ffcc00; }
        
        .header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="header">Coruna14 Pro Exploit</div>
    <div id="log-container">
        <div id="log"></div>
    </div>

    <script src="utility_module.js"></script>
    <script src="platform_module.js"></script>

    <script>
        const logElement = document.getElementById('log');

        function printLog(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logElement.appendChild(entry);
            console.log(msg);
        }

        // Клас ModuleManager, як в оригіналі
        class ModuleManager {
            constructor() {
                this.modules = new Map();
                printLog("ModuleManager ініціалізовано", "info");
            }

            registerModule(id, factory) {
                try {
                    const module = factory(this);
                    this.modules.set(id, module);
                    printLog(`Модуль ${id.substring(0,8)}... успішно додано`, "success");
                } catch (e) {
                    printLog(`Помилка реєстрації модуля ${id}: ${e}`, "error");
                }
            }

            getModuleByName(id) {
                return this.modules.get(id);
            }
        }

        async function init() {
            printLog("Початок завантаження системи...", "info");

            const mm = new ModuleManager();
            globalThis.moduleManager = mm;

            // Перевірка наявності функцій у завантажених файлах
            if (typeof m_57620206d62079baad0e57e6d9ec93120c0f5247 !== 'undefined') {
                mm.registerModule("57620206d62079baad0e57e6d9ec93120c0f5247", m_57620206d62079baad0e57e6d9ec93120c0f5247);
            } else {
                printLog("Utility module не знайдено! Перевір utility_module.js", "error");
            }

            if (typeof m_14669ca3b1519ba2a8f40be287f646d4d7593eb0 !== 'undefined') {
                mm.registerModule("14669ca3b1519ba2a8f40be287f646d4d7593eb0", m_14669ca3b1519ba2a8f40be287f646d4d7593eb0);
            } else {
                printLog("Platform module не знайдено! Перевір platform_module.js", "error");
            }

            const platform = mm.getModuleByName("14669ca3b1519ba2a8f40be287f646d4d7593eb0");
            
            if (platform && typeof platform.run === 'function') {
                printLog("Запуск основного процесу...", "warn");
                try {
                    await platform.run();
                } catch (err) {
                    printLog("Помилка під час виконання: " + err, "error");
                }
            } else {
                printLog("Метод platform.run не знайдено", "error");
            }
        }

        // Запускаємо після завантаження сторінки
        window.addEventListener('load', () => {
            setTimeout(init, 500);
        });
    </script>
</body>
</html>
